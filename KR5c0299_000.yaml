body:
  text: 石藥爾雅序似二夫爾雅者古人以訓釋難㝷之所作也毎想此機捷妙無以加故朝廷用之兼經多歷年代余西蜀江源人也少好道藝性攻丹術自弱至于知命窮究經方曽覽數百家論功者如同指掌用藥皆是隱名就於隱名之中又有多本若不備見猶畫餅夢桃遇其經方與不遇無别毎噫嗟此事悵恨無師由何意也因見參同契云未能悉究當施直義其理盡矣經曰吾欲結舌不言恐畏獲罪誅冩情於竹帛恐泄天之符故知聖賢至道玄妙之法不欲流俗偶然之所聞解也故委曲其事令上士勤而習之使下士棄而笑之理昭然也但恐後學同余苦心今附六家之口訣衆石之異名象爾雅詞句凡六篇勒爲一卷令疑迷者㝷之稍易習業者誦之不難兼諸丹所有别名竒方異術之號有法可營造者條列於前無法難作之流具名於後時唐元和丙戌梅彪序
