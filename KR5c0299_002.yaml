body:
  text: 載諸有法可營造丹名太一金丹太一玉粉丹太一金膏丹太一小還丹還魂駐魄丹召魂丹太一玉液丹華陽玉漿丹華漿太一龍胎丹太一三史丹光明麗日丹熱紫粉丹黃丹小神丹安期先生丹太一足火丹真人蒸成丹疏黃液丹裴君辟祭丹無忌丹主君雞子丹東方朔銀丹石湯赤烏丹冷紫粉丹太一小玉粉丹太一小金英丹韓衆漆丹雄黃紫油丹劉君鳯駐年丹五嶽真人小還丹紫遊丹太一赤車使者八神精起死人仙丹太一一味硇砂丹太一八景四蘂紫漿五珠絳生丹四神丹艮雪丹八石丹八神丹流黃丹龍珠丹龍虎丹龍雀丹五靈丹紫蓋丹三竒丹朝霞丹肘後丹凌霄丹羡門丹日成丹榖汁丹七變丹太黃丹葂血丹日丹酒丹棗丹蜜丹乳丹椒丹太一琅玕丹杏金丹紫金小還丹石腦丹赤石脂丹紅槿丹紫霞丹石膽丹紫蓋丹釋諸丹中有别名異號召魂丹一名返魂丹一名更生丹一名皎命丹一名金生丹無忌丹一名竪骨丹一名無畏丹一名凝神丹紫遊丹一名步虛丹一名舉輕丹一名到景丹一名華景丹一名凌虛丹四神丹一名太一神丹一名神變丹一名神液丹艮雪丹一名水銀霜丹一名流珠白雪丹一名飛仙英丹一名流珠素霜丹一名玄珠絳雪丹一名太陽紅粉丹一名朝霞散彩丹一名夕月流光丹一名傾相珠丹一名疑階積雪丹五嶽真人小還丹一名金精丹一名仙蕚丹一名救世丹太一小還丹一名太清丹一名朝景丹一名凝霞丹一名落耀丹一名絳雪丹太一硫黃丹一名太陽玉粉丹八石丹一名麗日丹一名度死丹一名濟世丹龍珠丹一名曳虹丹一名垂露丹一名金光丹一名吐耀丹還嵬駐魄丹一名駐顏丹一名朱雀丹一名定神丹一名延齡丹八神丹一名昭日丹一名流霞丹一名八精丹一名神光丹華陽玉漿丹一名陽元丹一名玉髓丹一名靈壽丹太一赤車使者八神精起死人丹一名還神丹一名回命丹一名通靈丹一名再生丹太一小玉粉丹一名素紹丹一名玄鶴丹一名飛雪丹太一小金英丹一名陽明丹一名玄珠丹一名日精丹太一金液華丹一名金華丹一名天真丹一名金仙丹一名躡雲丹太一一味雄黃丹一名赤流珠丹一名素耀丹一名赤耀丹一名紅紫相間丹太一八景四蘂紫遊玉珠生神丹一名黃老丹一名虛無丹一名含將丹一名散華丹太和龍胎丹一名持節丹一名棒香丹一名獻壽丹太一三使丹一名捧香丹一名持節丹一名奔雲丹一名控鶴丹一名本命丹五靈丹一名升霞丹一名凌霄丹一名靈華丹一名太一使者丹五石丹一名五星丹一名五精丹一名五彩丹一名五帝丹一名五嶽丹一名五霞丹一名八仙丹五石者空青東朱砂南白礜西磁石北雄黃中太一一味硇砂丹一名飛翼丹一名鹽粉丹一名素砂丹一名定神丹一名凝華丹敘諸經傳歌訣名目太清經玉鳥經九霄君經廣成君經狐剛子粉圖經抱朴子金丹經真人天玄録面上經狐剛子河車經陵陽子經黃仙子經稷丘子經青林子訣泉石子論九元子訣青霞子訣黃帝纂要經玄女録圖中經茅君金藏經茅君丹陽經桐柱經黃老金公經元君經雲宫玉華經四海神水記八公枕中記金碧潛通火記玄女五符記金石靈臺記石壁記洪寶記天台石室記召河伯記謁上皇日月記紫房虎書記山嶽流傾記流金火鈴記落羽建青記隂長生守爐記回老返嬰記猛將朱兵記七返靈砂歌八仙歌中還歌三白歌參同契魏君訣參同指歸太清訣衛靈訣九竒訣傳道訣龍雀隱訣登真隱訣塗山訣守真全生訣句留訣金靈訣五鹽訣金樓先生訣角里先生訣鼓下錫黃訣東林集琳房集丹瓊集八紀集契道祕録隋唐祕録白子髙玄圖録太清丹論混成論胡王冶葛論金石諭婆落魔地神伏火論五明論太清太鏡司馬鍊師精義諭紀仙玄鏡中還經杏金經青龍地經龍虎丹經丹家病源六甲玉女訣行厨金盤玉饌訣黃寧訣李少君訣西蜀樊德先生伏火訣太原胡列山人訣吉章經東都陳少府訣王倪伏火丹砂傳孫思邈經揚羅開伏火丹砂傳麻姑八石傳蘇遊經清源經太山孫杓赤龍金虎歌中還丹論顯諸經記中所造藥物名目造紫河車馬轉寧王金苟子法黃輿伏火法五石蒲樞法安靜虛無法造藥歸色法令飛法令飛者伏法令飛者飛法玄女如意解五尸法造通明金虎符法造通明九流符法造朱雀符法造通明青龍符法造通明玄武符法造黃龍表符法造金經符法造石精法造乘龍符法造五色鹽法造五石銅法造三精六液法造五色鉛金法造三十六水法造行厨招遠法錬雄黃法造水法錬五礬法太一禹餘糧法鍊鍾乳法鍊紫石法服玉法鉛華法清玉法玉丸法玉漿法柔玉法伏米法伏金法造金液華池法造牡荆酒化藥法造朱砂酒法造理石酒法造金粉法造銀粉法造銅粉法造鐵粉法造金膏法造銀膏法水銀膏法造柔赤期法柔黃雌法造白河車法赤河車法單青河車法造青華法硭硝河車法石亭脂河車法東野河車法鑞河車法紫河車法造銅青法五鹽法雄雪法雌雪法玄女五符法玄女白雪飛符法造鉛白法玄女神丹九轉法造飛霜赤雪法造玄黃法作犢食法造石灰煎法造玄珠法涓子菊華九變法元子神鐡法作水華法土龍汋法伏雄黃法伏雌黃法錬礜石法伏空青法造銀玄珠法造鉛拒火法造空亭液法桑爍法拒鑞法液蠟法造鉛華法作灰柸法作水柸法造錬雌法造炮礬法造黃磚法造礐華池法九轉鉛精法造大黃牙法青丹牙法漏鼎牙法秋石牙法苞裏流帝漿牙法攪栁牙法淣鉛法縮賀法造鳥鉛法造黑銅法液銀法造鉛粉法鍮石粉法小還丹牙法造黑牙法水錬雪母粉法右件經方世上並有文本或可以資經貸利或可以養性全生但遇一方並可營造若遍留意其途實繁然此衆之中唯道有優劣但隨間器之所入而各尋其所好也故水不可以乘駿駮陸不可以駕輕舟稻粱𦵔肉終同於飽麻紵紈䌤終同於暖飽暖雖一而精粗有殊逐甘利者即重小丹如金好延生者敬太丹似寶金寶之利各齊其分故具載於前矣論諸大仙丹有名無法者黃帝九鼎丹大仙升霞丹紫青仙童丹太和龍胎丹張真人靈飛丹太一八景丹馬明生白日升天丹金液華丹茅君白靈丹白雲赤雪丹絳陵垂壁丹七精辟惡丹三昧消災丹九光神景丹流霞鮮翠丹舍暉吐耀丹太清五色丹北帝玄珠丹神光散馥丹凝霜積雪丹奔星却月丹墮月驚心丹感靈降真丹通神役使丹九變丹大還丹九成丹紫精丹按楚澤經巳上諸丹並是往古得道者出世仙丹服之白日升天身生羽翼變化自在坐有立無藥味方法既非塵俗所知莫得測其至要也自非宿有仙骨積代纍功夢中神受者不可得其方法也石藥爾雅卷下
